<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big P - Mjini Moja kwa Moja</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px #000; }
        .bar { width: 250px; height: 15px; background: #444; border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #health { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4d4d, #e74c3c); transition: 0.2s; }
        #startPrompt, #gameOver { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: white; z-index: 30;
        }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 50px; font-weight: bold; }
        button:hover { background: #27ae60; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="startPrompt">
        <h1 style="color: #3498db;">🔵🔴 BIG P - MJINI RUN</h1>
        <p>Gusa screen au tumia mouse kukwepa mawe!</p>
        <button onclick="startGame()">WASHA INJINI</button>
    </div>

    <div id="ui">
        <div>AFYA YA MT-10:</div>
        <div class="bar"><div id="health"></div></div>
        <h1 id="score" style="margin: 5px 0;">ALAMA: 0</h1>
        <div>KASI: <span id="speedDisplay">0</span> KM/H</div>
    </div>

    <div id="gameOver" style="display:none;">
        <h1 style="color: #e74c3c;">💥 IMEGONGWA!</h1>
        <h2 id="finalScore"></h2>
        <button onclick="restartGame()">JARIBU TENA</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const healthBar = document.getElementById("health");
        const scoreText = document.getElementById("score");
        const speedNum = document.getElementById("speedDisplay");
        const gameOverUI = document.getElementById("gameOver");
        const startPrompt = document.getElementById("startPrompt");
        const finalScoreText = document.getElementById("finalScore");

        const imgPikipiki = new Image();
        imgPikipiki.src = "pikipiki.png"; // Picha yako ileile

        let viewW, viewH;
        let gameActive = false;
        let score = 0;
        let health = 100;
        let speed = 0;
        let frame = 0;
        let bgOffset = 0;
        
        // MAREKEBISHO YA UKUBWA (Kubwa kidogo kuliko ya kwanza, lakini isizibe kila kitu)
        const bike = { x: 80, y: 0, targetY: 0, w: 220, h: 140 }; 
        const stone = { x: 0, y: 0, r: 25 };

        function setup() {
            viewW = window.innerWidth;
            viewH = window.innerHeight;
            canvas.width = viewW;
            canvas.height = viewH;
            bike.y = viewH / 2 - bike.h / 2;
            bike.targetY = bike.y;
            stone.x = viewW + 300;
        }
        setup();

        function startGame() {
            startPrompt.style.display = "none";
            gameActive = true;
            update();
        }

        window.addEventListener("mousemove", (e) => {
            if(gameActive) bike.targetY = Math.max(50, Math.min(e.clientY - bike.h/2, viewH - 150));
        });

        window.addEventListener("touchmove", (e) => {
            if(gameActive) {
                bike.targetY = Math.max(50, Math.min(e.touches[0].clientY - bike.h/2, viewH - 150));
                e.preventDefault();
            }
        }, {passive: false});

        function drawWorld() {
            ctx.clearRect(0, 0, viewW, viewH);

            // 1. CHORA BACKGROUND INAYOJIRUDIA (Kutoka kwenye picha yenyewe)
            if (imgPikipiki.complete && imgPikipiki.naturalWidth !== 0) {
                bgOffset -= speed * 0.1; // Background inasogea taratibu
                if(bgOffset <= -viewW) bgOffset = 0;

                // Tunachora picha mbili zinazofuatana ili kujaza screen
                ctx.drawImage(imgPikipiki, bgOffset, 0, viewW, viewH);
                ctx.drawImage(imgPikipiki, bgOffset + viewW, 0, viewW, viewH);
                
                // --- ONGEZA ATHARI YA TAA ZA BLUE/NYEKUNDU ---
                // Taa zinaenda kulingana na frame ili zifanane na zile za kwenye picha
                frame++;
                let redFlash = Math.sin(frame * 0.05) * 0.3 + 0.5;
                let blueFlash = Math.cos(frame * 0.05) * 0.3 + 0.5;

                ctx.fillStyle = `rgba(231, 76, 60, ${redFlash * 0.15})`; // Red
                ctx.fillRect(0, 0, viewW, viewH);
                ctx.fillStyle = `rgba(52, 152, 219, ${blueFlash * 0.15})`; // Blue
                ctx.fillRect(0, 0, viewW, viewH);
                // ------------------------------------------

            } else {
                // Kama picha haijapakiwa, weka giza
                ctx.fillStyle = "#000"; ctx.fillRect(0, 0, viewW, viewH);
            }

            // 2. CHORA JIWE (Kikwazo cha giza kidogo)
            ctx.fillStyle = "rgba(100, 100, 100, 0.8)";
            ctx.beginPath(); ctx.arc(stone.x, stone.y, stone.r, 0, Math.PI*2); ctx.fill();

            // 3. CHORA PIKIPIKI (Inakaa juu ya background)
            if (imgPikipiki.complete) {
                // Tunasafisha muonekano kidogo ili asizibe kila kitu
                ctx.globalAlpha = 0.95; 
                ctx.drawImage(imgPikipiki, bike.x, bike.y, bike.w, bike.h);
                ctx.globalAlpha = 1;
            }
        }

        function update() {
            if (!gameActive) return;

            score += 0.2;
            bike.y += (bike.targetY - bike.y) * 0.1;
            speed = 70; // Kasi ya kudumu

            // Jiwe linakuja kwa kasi
            stone.x -= speed * 0.15;
            if (stone.x < -100) {
                stone.x = viewW + 500;
                // Jiwe linatokea popote kwenye screen sasa, siyo chini tu
                stone.y = 100 + Math.random() * (viewH - 200);
            }

            // Mgongano
            let dx = (bike.x + bike.w/2) - stone.x;
            let dy = (bike.y + bike.h/2) - stone.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 60) {
                health -= 25;
                stone.x = -200;
                if (health <= 0) {
                    gameActive = false;
                    finalScoreText.innerText = "Alama Ulizopata: " + Math.floor(score);
                    gameOverUI.style.display = "flex";
                }
            }

            healthBar.style.width = health + "%";
            scoreText.innerText = "ALAMA: " + Math.floor(score);
            speedNum.innerText = speed;

            drawWorld();
            requestAnimationFrame(update);
        }

        function restartGame() { location.reload(); }
        window.onresize = setup;
    </script>
</body>
</html>
