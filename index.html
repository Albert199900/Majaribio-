<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Big P - MT-10 Polini Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #3498db; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; background: #3498db; }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px black; }
        .bar { width: 150px; height: 15px; background: #444; border: 2px solid #fff; border-radius: 8px; overflow: hidden; }
        #health { width: 100%; height: 100%; background: #ff4d4d; transition: 0.2s; }
        
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: white; z-index: 200;
        }
        
        .big-btn { 
            padding: 25px 60px; font-size: 28px; cursor: pointer; 
            background: #2ecc71; border: none; color: white; 
            border-radius: 50px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .big-btn:active { transform: scale(0.95); background: #27ae60; }

        #brakeNotice { 
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); 
            color: #ff4d4d; font-weight: bold; display: none; font-size: 35px; text-shadow: 3px 3px 6px #000;
        }
        #pauseBtn { position: absolute; top: 10px; right: 10px; z-index: 100; padding: 10px 20px; background: #f1c40f; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <button id="pauseBtn" onclick="togglePause()">PAUSE</button>

    <div id="startPrompt" class="overlay">
        <h1 style="font-size: 45px; margin-bottom: 5px;">🏍️ MT-10 POLINI</h1>
        <p style="margin-bottom: 30px; font-size: 18px;">Gusa na ushikilie popote kwa **BREKI**</p>
        <button class="big-btn" onclick="startGame()">ANZA MCHEZO</button>
    </div>

    <div id="pauseMenu" class="overlay" style="display:none;">
        <h1>MCHEZO UMESIMAMA</h1>
        <button class="big-btn" onclick="togglePause()">ENDELEA</button>
    </div>

    <div id="gameOver" class="overlay" style="display:none;">
        <h1 style="color: #ff4d4d; font-size: 40px;">💥 GAME OVER!</h1>
        <h2 id="finalScore" style="margin-bottom: 20px;"></h2>
        <button class="big-btn" onclick="location.reload()">JARIBU TENA</button>
    </div>

    <div id="ui">
        <div>AFYA YA PIKIPIKI:</div>
        <div class="bar"><div id="health"></div></div>
        <h2 id="score" style="margin: 10px 0; font-size: 30px;">ALAMA: 0</h2>
        <div style="font-size: 20px;">KASI: <span id="speedVal">0</span> km/h</div>
    </div>

    <div id="brakeNotice">!!! BREKI !!!</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        const imgPikipiki = new Image();
        imgPikipiki.src = "pikipiki.png"; 

        let viewW, viewH, groundY;
        let gameActive = false;
        let isPaused = false;
        let isBraking = false;
        let score = 0;
        let health = 100;
        let speed = 0;
        let frame = 0;
        
        const bike = { x: 50, y: 0, targetY: 0, w: 220, h: 150 }; 
        const stone = { x: 0, y: 0, r: 30 };
        const particles = [];

        function initLayout() {
            viewW = window.innerWidth;
            viewH = window.innerHeight;
            canvas.width = viewW;
            canvas.height = viewH;
            groundY = viewH * 0.75;
            bike.y = groundY - bike.h;
            bike.targetY = bike.y;
            stone.x = viewW + 500;
            stone.y = groundY + 30;
        }

        window.addEventListener("load", initLayout);
        window.addEventListener("resize", initLayout);

        // Kuanza Mchezo
        function startGame() {
            console.log("Kitufe kimebonyezwa!");
            document.getElementById("startPrompt").style.display = "none";
            gameActive = true;
            isPaused = false;
            speed = 40;
            animate();
        }

        function togglePause() {
            if(!gameActive) return;
            isPaused = !isPaused;
            document.getElementById("pauseMenu").style.display = isPaused ? "flex" : "none";
        }

        // Controls
        const startBraking = () => { if(gameActive && !isPaused) isBraking = true; };
        const stopBraking = () => isBraking = false;

        window.addEventListener("mousedown", startBraking);
        window.addEventListener("mouseup", stopBraking);
        window.addEventListener("touchstart", (e) => { startBraking(); e.preventDefault(); }, {passive: false});
        window.addEventListener("touchend", stopBraking);

        window.addEventListener("mousemove", (e) => {
            if(gameActive && !isPaused) bike.targetY = e.clientY - bike.h/2;
        });
        window.addEventListener("touchmove", (e) => {
            if(gameActive && !isPaused) {
                bike.targetY = e.touches[0].clientY - bike.h/2;
                e.preventDefault();
            }
        }, {passive: false});

        function draw() {
            ctx.clearRect(0, 0, viewW, viewH);

            // Anga
            ctx.fillStyle = "#3498db";
            ctx.fillRect(0, 0, viewW, groundY);

            // Ardhi ya Polini
            ctx.fillStyle = "#d2b48c";
            ctx.beginPath();
            ctx.moveTo(0, viewH);
            for (let x = 0; x <= viewW; x += 20) {
                let y = Math.sin((x + frame) * 0.005) * 15 + groundY;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(viewW, viewH);
            ctx.fill();

            // Jiwe
            ctx.fillStyle = "#555";
            ctx.beginPath(); ctx.arc(stone.x, stone.y, stone.r, 0, Math.PI*2); ctx.fill();

            // Moshi
            particles.forEach((p, i) => {
                p.x -= speed * 0.1; p.o -= 0.02;
                ctx.fillStyle = `rgba(255,255,255,${p.o})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                if(p.o <= 0) particles.splice(i, 1);
            });

            // Chora Pikipiki
            if (imgPikipiki.complete && imgPikipiki.naturalWidth !== 0) {
                ctx.drawImage(imgPikipiki, bike.x, bike.y, bike.w, bike.h);
            } else {
                ctx.fillStyle = "#2980b9";
                ctx.fillRect(bike.x, bike.y, bike.w, bike.h);
                ctx.fillStyle = "white";
                ctx.font = "bold 20px Arial";
                ctx.fillText("MT-10 Loading...", bike.x + 20, bike.y + 70);
            }
        }

        function animate() {
            if (!gameActive) return;
            if (!isPaused) {
                if (isBraking) {
                    speed -= 1.5;
                    if (speed < 15) speed = 15;
                    document.getElementById("brakeNotice").style.display = "block";
                    particles.push({ x: bike.x + 30, y: bike.y + bike.h - 10, s: Math.random()*12+3, o: 0.8 });
                } else {
                    speed += 0.2;
                    if (speed > 120) speed = 120;
                    document.getElementById("brakeNotice").style.display = "none";
                }

                frame += speed * 0.2;
                score += speed * 0.01;
                bike.y += (bike.targetY - bike.y) * 0.1;

                stone.x -= speed * 0.25;
                if (stone.x < -100) {
                    stone.x = viewW + 300;
                    stone.y = groundY + (Math.random() * 100 - 10);
                }

                // Collision Detection
                let bx = bike.x + bike.w/2;
                let by = bike.y + bike.h/2;
                let dist = Math.sqrt((bx-stone.x)**2 + (by-stone.y)**2);
                if (dist < 70) {
                    health -= 25;
                    stone.x = -200;
                    document.getElementById("health").style.width = health + "%";
                    if (health <= 0) {
                        gameActive = false;
                        document.getElementById("gameOver").style.display = "flex";
                        document.getElementById("finalScore").innerText = "Alama Ulizopata: " + Math.floor(score);
                    }
                }

                document.getElementById("score").innerText = "ALAMA: " + Math.floor(score);
                document.getElementById("speedVal").innerText = Math.floor(speed);
                draw();
            }
            requestAnimationFrame(animate);
        }
        
        // Hii inahakikisha mchezo unachora mara ya kwanza hata kabla ya kuanza
        setTimeout(draw, 500);
    </script>
</body>
</html>
