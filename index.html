<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majaribio - Big P Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        .bar { width: 200px; height: 20px; background: #444; border: 2px solid #fff; }
        #health { width: 100%; height: 100%; background: #e74c3c; transition: 0.2s; }
        #gameOver { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; flex-direction: column; 
            align-items: center; justify-content: center; color: white; 
        }
        button { padding: 10px 20px; font-size: 20px; cursor: pointer; background: #2ecc71; border: none; color: white; }
    </style>
</head>
<body>

    <div id="ui">
        <div>AFYA:</div>
        <div class="bar"><div id="health"></div></div>
        <h2 id="score">ALAMA: 0</h2>
        <div>KASI: <span id="speed">0</span> km/h</div>
    </div>

    <div id="gameOver">
        <h1>GAME OVER!</h1>
        <h2 id="finalScore"></h2>
        <button onclick="restartGame()">CHEZA TENA</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const healthBar = document.getElementById("health");
        const scoreText = document.getElementById("score");
        const speedNum = document.getElementById("speed");
        const gameOverUI = document.getElementById("gameOver");
        const finalScoreText = document.getElementById("finalScore");

        // --- MAREKEBISHO YA PICHA ---
        const imgPikipiki = new Image();
        imgPikipiki.src = "pikipiki.png"; // Hakikisha jina hili linafanana na faili la GitHub
        // ----------------------------

        let viewW, viewH, groundY;
        let gameActive = true;
        let score = 0;
        let health = 100;
        let speed = 0;
        let targetSpeed = 50;
        let frame = 0;
        
        const bike = { x: 50, y: 0, targetY: 0, w: 100, h: 80 };
        const stone = { x: 0, y: 0, r: 30 };
        const particles = [];

        function setup() {
            viewW = window.innerWidth;
            viewH = window.innerHeight;
            canvas.width = viewW;
            canvas.height = viewH;
            groundY = viewH * 0.7;
            bike.y = groundY - bike.h;
            bike.targetY = bike.y;
            stone.x = viewW + 100;
            stone.y = groundY - 10;
        }
        setup();

        window.addEventListener("mousemove", (e) => {
            if(gameActive) bike.targetY = e.clientY - bike.h/2;
        });

        window.addEventListener("touchmove", (e) => {
            if(gameActive) {
                bike.targetY = e.touches[0].clientY - bike.h/2;
                e.preventDefault();
            }
        }, {passive: false});

        function drawWorld() {
            ctx.clearRect(0, 0, viewW, viewH);

            // Anga
            ctx.fillStyle = "#3498db";
            ctx.fillRect(0, 0, viewW, groundY);

            // Polini (Ardhi)
            ctx.beginPath();
            ctx.moveTo(0, viewH);
            ctx.fillStyle = "#d2b48c";
            for (let x = 0; x <= viewW; x += 10) {
                let y = Math.sin((x + frame) * 0.005) * 20 + groundY;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(viewW, viewH);
            ctx.fill();

            // Jiwe
            ctx.fillStyle = "#7f8c8d";
            ctx.beginPath(); ctx.arc(stone.x, stone.y, stone.r, 0, Math.PI*2); ctx.fill();

            // Moshi
            particles.forEach((p, i) => {
                p.x -= speed * 0.1; p.y -= 1; p.o -= 0.02; p.s += 0.5;
                if (p.o <= 0) particles.splice(i, 1);
                ctx.fillStyle = `rgba(200,200,200,${p.o})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });

            // CHORA PIKIPIKI
            if (imgPikipiki.complete && imgPikipiki.naturalWidth !== 0) {
                ctx.drawImage(imgPikipiki, bike.x, bike.y, bike.w, bike.h);
            } else {
                // Hii itatokea kama picha bado inapakuliwa au haijapatikana
                ctx.fillStyle = "#f1c40f"; 
                ctx.fillRect(bike.x, bike.y, bike.w, bike.h);
                ctx.fillStyle = "black";
                ctx.fillText("Inapakia...", bike.x + 10, bike.y + 40);
            }
        }

        function update() {
            if (!gameActive) return;

            frame += speed * 0.1;
            score += speed * 0.01;
            bike.y += (bike.targetY - bike.y) * 0.1;
            speed += (targetSpeed - speed) * 0.01;

            stone.x -= speed * 0.1;
            if (stone.x < -100) stone.x = viewW + Math.random() * 1000;

            if (frame % 5 < 1) {
                particles.push({ x: bike.x + 10, y: bike.y + bike.h - 10, s: Math.random()*5+2, o: 1 });
            }

            // Mgongano (Collision)
            let dx = (bike.x + bike.w/2) - stone.x;
            let dy = (bike.y + bike.h/2) - stone.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < stone.r + bike.h/2 - 10) {
                health -= 1; // Punguza afya polepole ikigusa
                if (health <= 0) endGame();
            }

            healthBar.style.width = health + "%";
            scoreText.innerText = "ALAMA: " + Math.floor(score);
            speedNum.innerText = Math.floor(speed);

            drawWorld();
            requestAnimationFrame(update);
        }

        function endGame() {
            gameActive = false;
            gameOverUI.style.display = "flex";
            finalScoreText.innerText = "Alama Zako: " + Math.floor(score);
        }

        function restartGame() {
            location.reload();
        }

        update();
        window.onresize = setup;

    </script>
</body>
</html>
